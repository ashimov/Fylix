server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    server_tokens off;

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location /admin/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
