<!doctype html>
<html lang="ru">
<body style="margin:0;padding:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F8FC;color:#2D2D3A;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#F7F8FC;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(39,38,102,0.08);">
        <tr>
          <td style="background:linear-gradient(135deg,#272666 0%,#1c1c50 100%);padding:24px 32px;color:#ffffff;">
            <h1 style="margin:0;font-size:22px;font-weight:700;letter-spacing:-0.01em;">Fylix</h1>
          </td>
        </tr>
        <tr>
          <td style="padding:32px;">
            <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">
              <strong>{{ sender_email }}</strong> отправил(а) вам файлы: {{ file_count }} шт., {{ total_mb }} МБ.
            </p>
            {% if message %}
            <blockquote style="background:#EDEEF5;border-left:3px solid #94BDE5;padding:12px 16px;margin:0 0 20px;font-style:italic;color:#5A5E7A;font-size:14px;">
              {{ message }}
            </blockquote>
            {% endif %}
            <p style="margin:0 0 24px;color:#5A5E7A;font-size:14px;">
              Ссылка действительна до {{ expires_at }}.
            </p>
            <p style="text-align:center;margin:0 0 16px;">
              <!-- nosemgrep: generic.html-templates.security.var-in-href.var-in-href -- download_url is server-generated, not user input -->
              <a href="{{ download_url }}" style="display:inline-block;background:#272666;color:#ffffff;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;">Скачать файлы</a>
            </p>
            <p style="margin:24px 0 0;color:#8A8EA8;font-size:12px;text-align:center;word-break:break-all;">
              {{ download_url }}
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px;background:#EDEEF5;color:#8A8EA8;font-size:12px;text-align:center;">
            Fylix — безопасный файлообмен
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
