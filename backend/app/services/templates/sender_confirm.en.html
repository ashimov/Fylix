<!doctype html>
<html lang="en">
<body style="margin:0;padding:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F8FC;color:#2D2D3A;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#F7F8FC;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(39,38,102,0.08);">
        <tr>
          <td style="background:linear-gradient(135deg,#272666 0%,#1c1c50 100%);padding:24px 32px;color:#ffffff;">
            <h1 style="margin:0;font-size:22px;font-weight:700;letter-spacing:-0.01em;">Fylix</h1>
          </td>
        </tr>
        <tr>
          <td style="padding:32px;">
            <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">
              Your transfer has been uploaded and is ready for recipients to download.
            </p>
            <p style="margin:0 0 16px;color:#5A5E7A;font-size:14px;">
              Recipients: {{ recipients | join(', ') }} ({{ file_count }} file(s)).
            </p>
            <p style="margin:0 0 8px;color:#5A5E7A;font-size:14px;">
              <strong>Download link for recipients:</strong>
            </p>
            <p style="margin:0 0 16px;color:#272666;font-size:13px;word-break:break-all;">
              <a href="{{ download_url }}" style="color:#272666;text-decoration:underline;">{{ download_url }}</a>
            </p>
            <p style="margin:0;color:#8A8EA8;font-size:13px;">
              Link is valid until {{ expires_at }}.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px;background:#EDEEF5;color:#8A8EA8;font-size:12px;text-align:center;">
            Fylix — secure file exchange
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
