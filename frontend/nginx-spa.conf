server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
