# ADJUST FOR PROD — see docs/DEPLOYMENT.md Section 6 for instructions on
# adding corporate CIDRs. DO NOT leave broad RFC1918 ranges (10/8, 172.16/12,
# 192.168/16) in production — any host on those subnets can reach /admin.
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    geo $admin_allowed {
        default 0;
        127.0.0.0/8   1;  # loopback
        172.17.0.0/16 1;  # Docker default bridge (dev; update if compose subnet differs)
        # Add prod corp CIDRs here — see docs/DEPLOYMENT.md Section 6.
        # Example: 203.0.113.0/24 1;
    }

    # $request_id is an nginx built-in (>= 1.11): 32-char random hex,
    # unique per request. Propagated to the backend via proxy_set_header
    # X-Request-Id and echoed into the access log so an ops incident can
    # be grep'd through nginx → api → worker with a single id.
    log_format main '$remote_addr - [$time_iso8601] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rid=$request_id';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 0;   # large uploads handled via tus (chunked)

    # --- TLS ---
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Basic rate-limit zones (full policy in Phase 4) ---
    limit_req_zone $binary_remote_addr zone=default:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80 default_server;
        return 301 https://$host$request_uri;
    }

    # --- Main server ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        location /admin/ {
            if ($admin_allowed = 0) {
                return 403 "admin access restricted";
            }
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
            proxy_pass http://admin-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
        }

        location /api/admin {
            if ($admin_allowed = 0) {
                return 403 "admin access restricted";
            }
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        # Prometheus scrape endpoint — same CIDR gate as /admin.
        # MUST NOT be exposed to the public internet.
        location = /metrics {
            if ($admin_allowed = 0) {
                return 403 "metrics access restricted";
            }
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 10s;
        }

        # POST /api/transfers — upload creation, stricter rate limit (10r/m, burst 3)
        location = /api/transfers {
            limit_req zone=upload burst=3 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # --- API, download, sender panel → HawkAPI api container ---
        location ~ ^/(healthz|api/|t/|s/) {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
            proxy_request_buffering off;   # stream upload chunks, don't buffer
            proxy_buffering off;           # stream download bytes, don't buffer
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location / {
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://hcaptcha.com https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://hcaptcha.com https://*.hcaptcha.com; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://hcaptcha.com https://*.hcaptcha.com; frame-src https://hcaptcha.com https://*.hcaptcha.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
        }
    }
}
