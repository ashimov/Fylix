# Grafana dashboard provisioning.
# Points Grafana at the mounted dashboards directory; any *.json file
# in there is auto-loaded on startup + every updateIntervalSeconds.

apiVersion: 1

providers:
  - name: Fylix
    orgId: 1
    folder: Fylix
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
