# Grafana datasource provisioning.
# Registers the Prometheus instance as the default datasource so
# dashboards don't need to hard-code UIDs.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
